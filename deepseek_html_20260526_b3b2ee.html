<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>南通仓库预约系统 | 数据直写腾讯文档</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: #f0f4f8;
            margin: 0;
            padding: 24px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 1.8rem 2rem;
            text-align: center;
        }
        .header h1 { margin: 0; font-weight: 600; font-size: 1.8rem; }
        .header p { margin: 0.5rem 0 0; opacity: 0.85; font-size: 0.9rem; }
        .card { padding: 2rem; }
        .section {
            margin-bottom: 2rem;
            border-bottom: 1px solid #e9edf2;
            padding-bottom: 1.5rem;
        }
        .section:last-child { border-bottom: none; padding-bottom: 0; }
        .section-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e2a3e;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: space-between;
        }
        .date-grid, .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            margin-top: 12px;
        }
        .date-card, .slot-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            padding: 12px;
            transition: all 0.2s;
            cursor: pointer;
            text-align: center;
        }
        .date-card.selected, .slot-card.selected {
            border: 2px solid #2a5298;
            background: #f0f7ff;
            box-shadow: 0 8px 18px rgba(42, 82, 152, 0.12);
        }
        .date-card:hover:not(.disabled-slot), .slot-card:hover:not(.disabled-slot) {
            transform: translateY(-2px);
            border-color: #8ba9d4;
        }
        .disabled-slot {
            opacity: 0.6;
            background: #f9f9fc;
            cursor: not-allowed;
        }
        .slot-time, .date-day {
            font-weight: 700;
            font-size: 1rem;
            color: #0f172a;
            margin-bottom: 6px;
        }
        .slot-remaining, .date-weekday {
            font-size: 0.7rem;
            background: #eef2ff;
            padding: 3px 8px;
            border-radius: 40px;
            color: #1e3c72;
            display: inline-block;
        }
        .selected-summary {
            background: #eef2ff;
            border-radius: 20px;
            padding: 16px;
            margin-top: 16px;
        }
        .selected-tag {
            display: inline-block;
            background: #2a5298;
            color: white;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin: 4px 6px 4px 0;
        }
        .form-group { margin-bottom: 1.2rem; }
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            color: #1e293b;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #2a5298;
            box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.2);
        }
        .row-2cols {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .row-2cols > div { flex: 1; min-width: 180px; }
        .error-msg {
            color: #d32f2f;
            background: #ffe9e9;
            padding: 10px 14px;
            border-radius: 16px;
            margin-top: 12px;
        }
        .success-msg {
            color: #1f6e43;
            background: #e0f2e9;
            padding: 10px 14px;
            border-radius: 16px;
            margin-top: 12px;
        }
        .btn {
            background: #2a5298;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
            margin-top: 8px;
        }
        .btn:hover { background: #1e3a6b; transform: scale(0.99); }
        .btn-secondary {
            background: #4a627a;
            width: auto;
            padding: 8px 20px;
            margin-top: 0;
        }
        .footnote {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 20px;
            color: #7e8b9c;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        @media (max-width: 640px) {
            .card { padding: 1.5rem; }
            .date-grid, .time-slots { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🚛 南通仓库预约送货系统</h1>
        <p>数据直写腾讯文档 | 多日期+多时段 | 每时段上限100方</p>
    </div>
    <div class="card">
        <div class="section">
            <div class="flex-between">
                <div><span class="status-badge" style="background:#e0f2e9; color:#1f6e43;">● 运行中</span></div>
                <button id="resetAllBtn" class="btn-secondary" style="background: #d98c00;">🔄 重置所有数据</button>
            </div>
        </div>

        <!-- 日期选择 -->
        <div class="section">
            <div class="section-title">
                <span>📅 1. 选择送货日期（可多选）</span>
                <span id="selectedDatesCount" style="font-size: 0.8rem;">已选 0 天</span>
            </div>
            <div id="dateGrid" class="date-grid"></div>
        </div>

        <!-- 时段选择 -->
        <div class="section">
            <div class="section-title">
                <span>⏰ 2. 选择送货时段（可多选）</span>
                <span id="selectedSlotsCount" style="font-size: 0.8rem;">已选 0 个时段</span>
            </div>
            <div id="timeSlotsContainer" class="time-slots"></div>
        </div>

        <!-- 已选汇总 -->
        <div class="section" id="summarySection" style="display: none;">
            <div class="section-title">
                <span>📋 3. 已选预约项</span>
                <button id="clearAllSelections" class="btn-secondary">清空全部</button>
            </div>
            <div id="selectedSummary" class="selected-summary"></div>
        </div>

        <!-- 货物信息 -->
        <div class="section">
            <div class="section-title"><span>📦 4. 货物信息</span></div>
            <div class="row-2cols">
                <div class="form-group"><label>订单号 *</label><input type="text" id="orderNo" placeholder="请输入订单号"></div>
                <div class="form-group"><label>箱数 *</label><input type="number" id="boxQty" placeholder="箱数" value="1" step="1" min="1"></div>
            </div>
            <div id="goodsMsg"></div>
        </div>

        <!-- 司机信息 -->
        <div class="section">
            <div class="section-title"><span>🚚 5. 司机信息</span></div>
            <div class="row-2cols">
                <div class="form-group"><label>司机姓名 *</label><input type="text" id="driverName" placeholder="例：李师傅"></div>
                <div class="form-group"><label>手机号码 *</label><input type="tel" id="driverPhone" placeholder="11位手机号"></div>
            </div>
        </div>

        <button id="submitBtn" class="btn">✅ 确认预约（提交到腾讯文档）</button>
        <div id="globalMsg" class="footnote"></div>
    </div>
</div>

<script>
    // ======================== 腾讯文档配置 ========================
    const TENCENT_CONFIG = {
        spreadsheetId: "DSEdNUERsSWxLbGp5",      // 表格ID
        appId: "a462df2f89e74aa09d1ed2279f37eaa8",
        openId: "54b838fbb61d4581ad3ac1f72446ada8",
        accessToken: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJjbHQiOiJhNDYyZGYyZjg5ZTc0YWEwOWQxZWQyMjc5ZjM3ZWFhOCIsInR5cCI6MSwiZXhwIjoxNzgyMzU5NTQ4LjIxNzQ3NzgsImlhdCI6MTc3OTc2NzU0OC4yMTc0Nzc4LCJzdWIiOiI1NGI4MzhmYmI2MWQ0NTgxYWQzYWMxZjcyNDQ2YWRhOCJ9.sRykv2i4OMJAIEoTnRmSO4ULkXhK4CACkjHj7vXS_fg"
    };

    const MAX_CUBIC = 100;
    const SLOTS_DATA_KEY = 'booking_slots_remaining_map';
    
    // 时段定义
    const TIME_SLOTS = [
        { id: "09", label: "09:00-10:00", start: "09:00", end: "10:00" },
        { id: "10", label: "10:00-11:00", start: "10:00", end: "11:00" },
        { id: "11", label: "11:00-12:00", start: "11:00", end: "12:00" },
        { id: "13", label: "13:00-14:00", start: "13:00", end: "14:00" },
        { id: "14", label: "14:00-15:00", start: "14:00", end: "15:00" },
        { id: "15", label: "15:00-16:00", start: "15:00", end: "16:00" },
        { id: "16", label: "16:00-17:00", start: "16:00", end: "17:00" },
        { id: "17", label: "17:00-18:00", start: "17:00", end: "18:00" }
    ];
    
    // 全局状态
    let selectedDates = new Set();
    let selectedSlots = new Set();
    let slotRemainingMap = new Map();
    
    // 辅助函数
    function formatDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, '0');
        const day = String(date.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }
    
    function getWeekday(dateStr) {
        const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
        return weekdays[new Date(dateStr).getDay()];
    }
    
    function generateNext7Days() {
        const dates = [];
        const today = new Date();
        for (let i = 0; i < 14; i++) {
            const date = new Date(today);
            date.setDate(today.getDate() + i);
            dates.push(formatDate(date));
        }
        return dates;
    }
    
    function getRemaining(date, slotId) {
        const key = `${date}_${slotId}`;
        return slotRemainingMap.has(key) ? slotRemainingMap.get(key) : MAX_CUBIC;
    }
    
    function setRemaining(date, slotId, value) {
        const key = `${date}_${slotId}`;
        slotRemainingMap.set(key, Math.max(0, value));
        saveRemainingToStorage();
    }
    
    function saveRemainingToStorage() {
        const obj = {};
        for (const [key, value] of slotRemainingMap.entries()) obj[key] = value;
        localStorage.setItem(SLOTS_DATA_KEY, JSON.stringify(obj));
    }
    
    function loadRemainingFromStorage() {
        const saved = localStorage.getItem(SLOTS_DATA_KEY);
        if (saved) {
            try {
                const obj = JSON.parse(saved);
                for (const [key, value] of Object.entries(obj)) slotRemainingMap.set(key, value);
            } catch(e) { console.warn(e); }
        }
    }
    
    function getSlotLabel(slotId) {
        return TIME_SLOTS.find(s => s.id === slotId)?.label || slotId;
    }
    
    // 写入腾讯文档
    async function writeToTencentSheet(bookingData) {
        const url = `https://docs.qq.com/openapi/v1/spreadsheets/${TENCENT_CONFIG.spreadsheetId}/values/append`;
        
        // 准备要写入的行数据
        const rowData = [
            bookingData.bookingTime,      // 预约时间
            bookingData.orderNo,          // 订单号
            bookingData.boxQty,           // 箱数
            bookingData.cubeOccupied,     // 占用方数
            bookingData.driverName,       // 司机姓名
            bookingData.driverPhone,      // 司机手机
            bookingData.date,             // 日期
            bookingData.slotLabel,        // 时段
            bookingData.slotStart,        // 开始时间
            bookingData.slotEnd           // 结束时间
        ];
        
        const response = await fetch(url, {
            method: 'POST',
            headers: {
                'Access-Token': TENCENT_CONFIG.accessToken,
                'Client-Id': TENCENT_CONFIG.appId,
                'Open-Id': TENCENT_CONFIG.openId,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                range: 'Sheet1!A:J',
                values: [rowData],
                valueInputOption: 'USER_ENTERED'
            })
        });
        
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`腾讯文档API错误 (${response.status}): ${errorText}`);
        }
        return await response.json();
    }
    
    // 扣减方数
    function deductForSelection(dateList, slotIdList, boxCount) {
        const deductions = [];
        for (const date of dateList) {
            for (const slotId of slotIdList) {
                const remaining = getRemaining(date, slotId);
                if (remaining < boxCount) {
                    return { success: false, error: `日期 ${date} 时段 ${getSlotLabel(slotId)} 剩余不足（需${boxCount}方，剩${remaining}方）` };
                }
                deductions.push({ date, slotId, newRemaining: remaining - boxCount });
            }
        }
        for (const d of deductions) setRemaining(d.date, d.slotId, d.newRemaining);
        return { success: true };
    }
    
    // UI渲染
    function renderDateGrid() {
        const container = document.getElementById('dateGrid');
        const dates = generateNext7Days();
        container.innerHTML = '';
        dates.forEach(dateStr => {
            const isSelected = selectedDates.has(dateStr);
            const card = document.createElement('div');
            card.className = `date-card ${isSelected ? 'selected' : ''}`;
            card.innerHTML = `<div class="date-weekday">${getWeekday(dateStr)}</div><div class="date-day">${dateStr.slice(5)}</div>`;
            card.onclick = () => {
                if (selectedDates.has(dateStr)) selectedDates.delete(dateStr);
                else selectedDates.add(dateStr);
                renderDateGrid();
                updateSummaryAndCounters();
            };
            container.appendChild(card);
        });
        document.getElementById('selectedDatesCount').innerText = `已选 ${selectedDates.size} 天`;
    }
    
    function renderTimeSlots() {
        const container = document.getElementById('timeSlotsContainer');
        container.innerHTML = '';
        TIME_SLOTS.forEach(slot => {
            const isSelected = selectedSlots.has(slot.id);
            const card = document.createElement('div');
            card.className = `slot-card ${isSelected ? 'selected' : ''}`;
            card.innerHTML = `<div class="slot-time">${slot.label}</div><div class="slot-remaining">上限 ${MAX_CUBIC} 方</div>`;
            card.onclick = () => {
                if (selectedSlots.has(slot.id)) selectedSlots.delete(slot.id);
                else selectedSlots.add(slot.id);
                renderTimeSlots();
                updateSummaryAndCounters();
            };
            container.appendChild(card);
        });
        document.getElementById('selectedSlotsCount').innerText = `已选 ${selectedSlots.size} 个时段`;
    }
    
    function updateSummaryAndCounters() {
        const summarySection = document.getElementById('summarySection');
        const summaryDiv = document.getElementById('selectedSummary');
        const datesArray = Array.from(selectedDates).sort();
        const slotsArray = Array.from(selectedSlots).sort((a,b) => parseInt(a)-parseInt(b));
        
        if (datesArray.length === 0 || slotsArray.length === 0) {
            summarySection.style.display = 'none';
            return;
        }
        summarySection.style.display = 'block';
        let html = '<div style="margin-bottom:12px; font-weight:500;">📌 将预约以下项目：</div>';
        for (const date of datesArray) {
            for (const slotId of slotsArray) {
                const remaining = getRemaining(date, slotId);
                html += `<span class="selected-tag">📅 ${date} ${getSlotLabel(slotId)} (剩${remaining}方)</span>`;
            }
        }
        summaryDiv.innerHTML = html;
        document.getElementById('selectedDatesCount').innerText = `已选 ${selectedDates.size} 天`;
        document.getElementById('selectedSlotsCount').innerText = `已选 ${selectedSlots.size} 个时段`;
    }
    
    function clearAllSelections() {
        selectedDates.clear();
        selectedSlots.clear();
        renderDateGrid();
        renderTimeSlots();
        updateSummaryAndCounters();
        showMessage(globalMsgDiv, '已清空所有选择', false);
    }
    
    function resetAllData() {
        if (confirm('⚠️ 重置将清空所有预约记录（恢复时段为100方）。确定吗？')) {
            slotRemainingMap.clear();
            saveRemainingToStorage();
            selectedDates.clear();
            selectedSlots.clear();
            renderDateGrid();
            renderTimeSlots();
            updateSummaryAndCounters();
            showMessage(globalMsgDiv, '✅ 所有时段已重置为100方', false);
        }
    }
    
    function showMessage(element, msg, isError = true) {
        element.innerHTML = `<div class="${isError ? 'error-msg' : 'success-msg'}">${msg}</div>`;
        setTimeout(() => { if (element.innerHTML.includes(msg)) element.innerHTML = ""; }, 5000);
    }
    
    // 提交预约
    async function submitBooking() {
        const orderNo = document.getElementById('orderNo').value.trim();
        const boxQty = parseInt(document.getElementById('boxQty').value);
        const driverName = document.getElementById('driverName').value.trim();
        const driverPhone = document.getElementById('driverPhone').value.trim();
        const goodsMsgDiv = document.getElementById('goodsMsg');
        
        if (!orderNo) { showMessage(goodsMsgDiv, '请填写订单号', true); return; }
        if (isNaN(boxQty) || boxQty <= 0) { showMessage(goodsMsgDiv, '请填写有效的箱数', true); return; }
        if (selectedDates.size === 0) { showMessage(globalMsgDiv, '请至少选择一个日期', true); return; }
        if (selectedSlots.size === 0) { showMessage(globalMsgDiv, '请至少选择一个时段', true); return; }
        if (!driverName) { showMessage(globalMsgDiv, '请填写司机姓名', true); return; }
        if (!driverPhone) { showMessage(globalMsgDiv, '请填写手机号码', true); return; }
        if (!/^1[3-9]\d{9}$/.test(driverPhone)) { showMessage(globalMsgDiv, '请填写正确的11位手机号', true); return; }
        
        const dateList = Array.from(selectedDates);
        const slotIdList = Array.from(selectedSlots);
        const occupiedCube = boxQty;
        
        // 校验剩余容量
        for (const date of dateList) {
            for (const slotId of slotIdList) {
                if (getRemaining(date, slotId) < occupiedCube) {
                    showMessage(globalMsgDiv, `❌ ${date} ${getSlotLabel(slotId)} 剩余方数不足`, true);
                    return;
                }
            }
        }
        
        // 先扣减本地容量
        const deductResult = deductForSelection(dateList, slotIdList, occupiedCube);
        if (!deductResult.success) { showMessage(globalMsgDiv, deductResult.error, true); return; }
        
        // 逐条写入腾讯文档（每个日期+时段组合写一行）
        let writeErrors = [];
        for (const date of dateList) {
            for (const slotId of slotIdList) {
                const slot = TIME_SLOTS.find(s => s.id === slotId);
                const bookingItem = {
                    bookingTime: new Date().toISOString().slice(0, 19).replace('T', ' '),
                    orderNo: orderNo,
                    boxQty: boxQty,
                    cubeOccupied: occupiedCube,
                    driverName: driverName,
                    driverPhone: driverPhone,
                    date: date,
                    slotLabel: slot.label,
                    slotStart: slot.start,
                    slotEnd: slot.end
                };
                try {
                    await writeToTencentSheet(bookingItem);
                } catch (err) {
                    writeErrors.push(`${date} ${slot.label}: ${err.message}`);
                }
            }
        }
        
        if (writeErrors.length > 0) {
            showMessage(globalMsgDiv, `部分写入失败: ${writeErrors.join('; ')}`, true);
        } else {
            showMessage(globalMsgDiv, `✅ 预约成功！已写入 ${dateList.length * slotIdList.length} 条记录到腾讯文档`, false);
        }
        
        // 清空表单和选择
        selectedDates.clear();
        selectedSlots.clear();
        renderDateGrid();
        renderTimeSlots();
        updateSummaryAndCounters();
        document.getElementById('orderNo').value = '';
        document.getElementById('boxQty').value = '1';
        document.getElementById('driverName').value = '';
        document.getElementById('driverPhone').value = '';
    }
    
    // 初始化
    function init() {
        loadRemainingFromStorage();
        renderDateGrid();
        renderTimeSlots();
        updateSummaryAndCounters();
        
        document.getElementById('submitBtn').onclick = submitBooking;
        document.getElementById('resetAllBtn').onclick = resetAllData;
        document.getElementById('clearAllSelections').onclick = clearAllSelections;
        
        const inputs = ['orderNo', 'boxQty', 'driverName', 'driverPhone'];
        inputs.forEach(id => {
            document.getElementById(id)?.addEventListener('keypress', (e) => { if (e.key === 'Enter') submitBooking(); });
        });
        
        console.log("系统已启动，数据将直写腾讯文档");
    }
    init();
</script>
</body>
</html>
